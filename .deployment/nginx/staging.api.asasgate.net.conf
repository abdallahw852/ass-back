# ────────────────────────────────────────────────────────────────────────────
#  Nginx – Staging reverse-proxy for ASAS Backend
#  Domain : staging.api.asasgate.net
#  Backend: Docker container "asas_staging_app" on port 3000  (network asas_staging)
#
#  TLS is handled by Certbot / Let's Encrypt.
#  Run:  certbot --nginx -d staging.api.asasgate.net
#  after placing this file and reloading nginx.
# ────────────────────────────────────────────────────────────────────────────

# ── Upstream ─────────────────────────────────────────────────────────────────
# If Nginx and Docker are on the same host, use the container's docker-network
# IP. The easiest approach is to map Nginx to the host network and let Docker
# publish nothing — just proxy to 127.0.0.1:3000 via --network host, OR use
# the container name as a DNS name when Nginx itself is inside Docker.
#
# For a bare-metal / VM setup (most common for self-hosted runners), the app
# container maps port 3000 to 127.0.0.1 ONLY, so we proxy to 127.0.0.1:3000.
upstream asas_staging_backend {
    server 127.0.0.1:3000;

    # Enable keep-alive to the backend
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    server_name staging.api.asasgate.net;

    # Let Certbot manage ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS vhost ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name staging.api.asasgate.net;

    # ── TLS certs (managed by Certbot) ────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/staging.api.asasgate.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.api.asasgate.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/staging.api.asasgate.net.access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/staging.api.asasgate.net.error.log  warn;

    # ── Buffer / timeout tuning for a NestJS API ──────────────────────────────
    client_max_body_size    50m;
    proxy_read_timeout      120s;
    proxy_connect_timeout   10s;
    proxy_send_timeout      120s;

    # ── Proxy to NestJS app ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://asas_staging_backend;
        proxy_http_version 1.1;

        # Required for keep-alive
        proxy_set_header   Connection        "";

        # Forward real client info
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # Buffer settings
        proxy_buffering        on;
        proxy_buffer_size      8k;
        proxy_buffers          8 8k;
        proxy_busy_buffers_size 16k;
    }

    # ── WebSocket support (if you use socket.io) ────────────────────────────
    location /socket.io/ {
        proxy_pass         http://asas_staging_backend;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health endpoint (bypass auth if needed) ───────────────────────────────
    location = /api/v1/health {
        proxy_pass         http://asas_staging_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host      $host;

        access_log off;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
