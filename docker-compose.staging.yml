services:
  # ── PostgreSQL Write DB (Primary) ──────────────────────────────────────────
  postgres-write:
    image: postgres:18-alpine
    container_name: asas_staging_postgres_write
    # Enable WAL streaming replication
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=64MB
      -c max_replication_slots=3
      -c hot_standby=on
    environment:
      POSTGRES_USER: ${WRITE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${WRITE_DB_PASS:-postgres}
      POSTGRES_DB: ${WRITE_DB_NAME:-asas_write_staging}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicator}
    volumes:
      # PG18+: mount at the parent dir; image creates data in 18/main automatically
      - postgres_write_data_staging:/var/lib/postgresql
      # Runs once on first boot to create the replication user + pg_hba rule
      - ./postgres/primary/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${WRITE_DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - asas_staging

  # ── PostgreSQL Read DB (Hot Standby Replica) ────────────────────────────────
  postgres-read:
    image: postgres:18-alpine
    container_name: asas_staging_postgres_read
    # Custom entrypoint: clones primary via pg_basebackup on first boot,
    # then streams WAL continuously.
    entrypoint: ["/replica-entrypoint.sh"]
    environment:
      # PG18 Alpine: data lives at 18/docker inside the mounted parent dir
      PGDATA: /var/lib/postgresql/18/docker
      REPLICATION_HOST: postgres-write
      REPLICATION_PORT: "5432"
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicator}
    volumes:
      # Mount the parent dir — replica entrypoint writes data into 18/main
      - postgres_read_data_staging:/var/lib/postgresql
      - ./postgres/replica/entrypoint.sh:/replica-entrypoint.sh:ro
    depends_on:
      postgres-write:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${REPLICATION_USER:-replicator} -d postgres']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - asas_staging

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: asas_staging_redis
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data_staging:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - asas_staging

  # ── Elasticsearch ───────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    container_name: asas_staging_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data_staging:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTICSEARCH_PASSWORD:-changeme} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - asas_staging

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    image: ${APP_IMAGE}
    container_name: asas_staging_app
    env_file: .env
    # Temporary: route all reads to primary (commented replica); remove when replica is back.
    environment:
      READ_DB_HOST: postgres-write
      READ_DB_PORT: "5432"
      READ_DB_USER: ${WRITE_DB_USER:-postgres}
      READ_DB_PASS: ${WRITE_DB_PASS:-postgres}
      READ_DB_NAME: ${WRITE_DB_NAME:-asas_write_staging}
    # Bind to localhost only — Nginx on the host proxies to this port.
    # Not exposed publicly (127.0.0.1 only).
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      postgres-write:
        condition: service_healthy
      # postgres-read:
      #   condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - asas_staging

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: asas_staging_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - asas_staging

  # ── Certbot (Auto-Renewal) ──────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: asas_staging_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
      - ./nginx/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - asas_staging

networks:
  asas_staging:
    name: asas_staging
    driver: bridge

volumes:
  postgres_write_data_staging:
  postgres_read_data_staging:
  redis_data_staging:
  elasticsearch_data_staging:
